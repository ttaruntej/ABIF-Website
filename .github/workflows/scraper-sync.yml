name: Daily Funding Scraper Sync

concurrency:
  group: scraper-sync-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches:
      - main
  schedule:
    # Runs at 00:00 UTC every day
    - cron: '0 0 * * *'
  workflow_dispatch: # Allows manual triggering from GitHub UI

permissions:
  contents: write

jobs:
  scrape-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm ci

      - name: Run Scraper
        run: node scripts/scraper.js

      - name: Commit Scraped Data
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add public/data/opportunities.json
          # Only commit if there are changes
          git diff --quiet && git diff --staged --quiet || git commit -m "chore: auto-sync funding data from scrapers"
          git push

      - name: Build React App
        run: npm run build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          # Preserve history for cleaner deployments
          keep_files: true 
