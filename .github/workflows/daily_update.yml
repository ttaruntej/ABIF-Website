name: Daily Funding Tracker Update

concurrency:
  group: daily-update-${{ github.ref }}
  cancel-in-progress: true

on:
  schedule:
    - cron: '0 3 * * *' # 9:00 AM IST (approx 3:30 AM UTC)
  workflow_dispatch: # Allow manual trigger

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install requests duckduckgo_search

      - name: Run Tracker Update
        run: |
          # Copy script to repo root if needed or run from path
          python ../update_tracker.py
        env:
          # If we use Gemini API directly in future, add secret here
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Commit and Push data changes
        run: |
          git config --global user.name "ABIF Automation"
          git config --global user.email "automation@abif.org"
          git add public/data/opportunities.json
          git commit -m "Daily update: $(date +'%Y-%m-%d')" || echo "No changes to commit"
          git push

      - name: Install Node.js dependencies
        run: npm install

      - name: Build Website
        run: npm run build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist

